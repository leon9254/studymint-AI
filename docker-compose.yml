version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studymint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studymint}
      POSTGRES_DB: ${POSTGRES_DB:-studymint}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: ./studymint-ai-backend-main
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    command: ["alembic", "upgrade", "head"]

  backend:
    build:
      context: ./studymint-ai-backend-main
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - migrate
    expose:
      - "8000"
    volumes:
      - backend_exports:/app/exports

  frontend:
    build:
      context: ./studymint-ai-frontend-main
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_exports:
